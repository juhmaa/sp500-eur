name: Update S&P 500 EUR table
 
on:
  # Runs at 22:30 UTC Mon–Fri (US market closes at ~21:00 UTC)
  schedule:
    - cron: '30 22 * * 1-5'
  # Lets you trigger a run manually from the GitHub web UI
  workflow_dispatch:
 
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed so the job can commit back to the repo
 
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
 
      - name: Install dependencies
        run: pip install yfinance requests pandas
 
      - name: Fetch data and generate table
        run: python fetch_data.py
 
      - name: Commit and push if the table changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit when there are actual changes (skips weekends / holidays)
          git diff --staged --quiet || \
            git commit -m "chore: update S&P 500 EUR data $(date -u +%Y-%m-%d)" && \
            git push
 
